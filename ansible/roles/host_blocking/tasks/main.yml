- name: ensure git is installed
  become: true
  package:
    name: git
    state: present

- name: clone or pull StevenBlack hosts repo
  git:
    repo: https://github.com/StevenBlack/hosts.git
    dest: "{{ user_home }}/.stevenblack-hosts"
    version: master
    update: yes
    depth: 1
  register: git_result

- name: get hostname
  command: hostname
  register: hostname_output
  changed_when: false

- name: write /etc/hosts from repo with local hostname prepended
  become: true
  template:
    src: stevenblack_hosts.j2
    dest: /etc/hosts
  vars:
    local_hostname: "{{ hostname_output.stdout }}"
  when: git_result.changed
