
- name: make sure older versions of docker are removed
  become: true
  package:
    state: absent
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc

# Install instructions at: https://docs.docker.com/engine/install/ubuntu/

- name: Add Docker GPG apt key
  become: true
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Add Docker apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present

- name: install docker packages
  become: true
  package:
    update_cache: true
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin

- name: create docker group
  become: true
  group:
    name: docker
    state: present

- name: sudoless docker commands
  become: true
  user:
    name: "{{ lookup('ansible.builtin.env', 'USER') }}"
    groups: docker
    append: yes
