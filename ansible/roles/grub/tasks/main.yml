
# make sure grub menu always displays on startup
# Helps ensure that we can always enter 'recovery' mode if we need it
- name: Set GRUB_TIMEOUT_STYLE to menu
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^GRUB_TIMEOUT_STYLE=.*'
    replace: 'GRUB_TIMEOUT_STYLE=menu'
  become: true
  notify: update_grub

- name: Set GRUB_TIMEOUT to 2 seconds
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^GRUB_TIMEOUT=.*'
    replace: 'GRUB_TIMEOUT=2'
  become: true
  notify: update_grub
